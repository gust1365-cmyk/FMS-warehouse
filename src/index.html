<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMS 창고 로케이션 현황 대시보드</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --blue:#3b82f6;--orange:#f97316;--text:#e8eaf0;--muted:#8b93b0;--dim:#4a5068;
  --fresh:#22c55e;--fresh-bg:rgba(34,197,94,.13);
  --warn:#f59e0b; --warn-bg:rgba(245,158,11,.13);
  --danger:#ef4444;--danger-bg:rgba(239,68,68,.15);
  --empty:#181b28;
  --bag-cols:4; --bag-rows:8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;
  display:flex;flex-direction:column;height:100vh;padding:7px 10px 5px;
}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:8px;padding-bottom:5px;border-bottom:1px solid var(--border);flex-shrink:0;margin-bottom:5px;}
.hdr h1{font-size:.95rem;font-weight:800;letter-spacing:-.02em;white-space:nowrap;}
.hdr h1 span{color:var(--blue);}
.live{display:flex;align-items:center;gap:4px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:2px 8px;font-size:.62rem;color:var(--fresh);font-weight:700;white-space:nowrap;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--fresh);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#nowTime{font-size:.62rem;color:var(--dim);white-space:nowrap;}
.sum-pills{display:flex;gap:3px;margin-left:auto;}
.sp{padding:2px 7px;border-radius:5px;font-size:.6rem;font-weight:700;border:1px solid var(--border);background:var(--surface);white-space:nowrap;}
.sp .sv{font-size:.82rem;font-weight:800;margin-right:2px;}
.sp.cb .sv{color:var(--blue)}.sp.cg .sv{color:var(--fresh)}.sp.cw .sv{color:var(--warn)}.sp.cd .sv{color:var(--danger)}

/* ── CONTROLS ── */
.ctrl{display:flex;gap:4px;align-items:center;flex-shrink:0;margin-bottom:4px;}
.btn{padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.65rem;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn:hover,.btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-add{background:var(--orange)!important;color:#fff!important;border-color:var(--orange)!important;}
.btn-up{color:var(--blue);border-color:var(--blue);}
.btn-up:hover{background:var(--blue);color:#fff;}
.legend-inline{display:flex;gap:7px;margin-left:auto;align-items:center;}
.li{display:flex;align-items:center;gap:3px;font-size:.6rem;color:var(--muted);}
.ld{width:8px;height:8px;border-radius:2px;}

/* ── MAIN ── */
.main{flex:1;display:flex;gap:6px;min-height:0;overflow:hidden;}
.racks-col{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;overflow:hidden;}
.asm-col{flex:0 0 330px;display:flex;flex-direction:column;min-height:0;}

/* ── RACK BLOCK ── */
.rack-block{
  background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:5px 7px;flex:1;min-height:0;display:flex;flex-direction:column;
}
.rack-header{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-shrink:0;}
.rack-badge{background:var(--blue);color:#fff;font-size:.58rem;font-weight:800;padding:1px 6px;border-radius:3px;letter-spacing:.04em;}
.rack-name{font-size:.58rem;color:var(--muted);}
.fifo-note{margin-left:auto;font-size:.54rem;color:var(--dim);}
.fifo-note span{color:var(--orange);font-weight:700;}

/* rack grid */
.rack-body{display:flex;flex-direction:column;gap:2px;flex:1;min-height:0;}
.rack-loc-header{display:flex;gap:2px;padding-left:28px;flex-shrink:0;}
.rack-loc-num{text-align:center;font-size:.5rem;color:var(--blue);font-weight:700;flex:1;min-width:0;}
.rack-tier-row{display:flex;align-items:stretch;gap:2px;flex:1;min-height:0;}
.tier-label{
  width:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:.52rem;font-weight:800;border-radius:3px;
  background:var(--surface2);border:1px solid var(--border);writing-mode:horizontal-tb;
}
.tier-lower{color:var(--orange);}
.tier-upper{color:var(--muted);}

/* ── Pallet Cell ── */
.pcell{
  flex:1;border-radius:4px;border:1px solid var(--border);
  min-height:0;min-width:0;position:relative;cursor:pointer;overflow:hidden;
  transition:border-color .12s;display:flex;flex-direction:column;
}
.pcell:hover{border-color:var(--blue);box-shadow:0 0 0 1px rgba(59,130,246,.3);}
.pcell.empty{background:var(--empty);border-style:dashed;align-items:center;justify-content:center;}
.pcell.fresh{background:var(--fresh-bg);border-color:rgba(34,197,94,.35);}
.pcell.warn {background:var(--warn-bg); border-color:rgba(245,158,11,.35);}
.pcell.danger{background:var(--danger-bg);border-color:rgba(239,68,68,.4);}
.fifo-tag{position:absolute;top:2px;right:3px;font-size:.45rem;font-weight:800;color:var(--orange);line-height:1;z-index:1;}
.empty-lbl{font-size:.48rem;color:var(--dim);}

/* ── Resin graphic — fills cell ── */
.resin-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(8,1fr);
  gap:1.5px;
  padding:12px 4px 2px;
  flex:1;min-height:0;
  width:100%;
}
.rb{
  border-radius:1.5px;
  transition:opacity .2s;
}
/* filled bag colors per status */
.fresh  .rb.on{background:#4ade80;box-shadow:inset 0 1px 0 rgba(255,255,255,.25);}
.warn   .rb.on{background:#fbbf24;box-shadow:inset 0 1px 0 rgba(255,255,255,.25);}
.danger .rb.on{background:#f87171;box-shadow:inset 0 1px 0 rgba(255,255,255,.25);}
/* empty slot */
.rb.off{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);}

.cell-info{padding:1px 3px 3px;text-align:center;flex-shrink:0;}
.cell-mat{font-size:.48rem;font-weight:700;color:var(--text);line-height:1.15;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cell-kg{font-size:.62rem;font-weight:800;color:var(--text);}
.cell-dt{font-size:.43rem;color:var(--dim);}
.cell-lot{font-size:.43rem;color:var(--dim);}
.cell-days{font-size:.44rem;font-weight:800;}
.fresh .cell-days{color:var(--fresh);}
.warn  .cell-days{color:var(--warn);}
.danger .cell-days{color:var(--danger);}

/* ── ASM ── */
.asm-outer{
  background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:5px 7px;flex:1;min-height:0;display:flex;flex-direction:column;
}
.asm-unit-wrap{display:flex;flex-direction:column;gap:3px;flex:1;min-height:0;}
.asm-unit{border:1px solid var(--border);border-radius:5px;overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:0;}
.asm-unit-hdr{background:var(--surface2);padding:2px 6px;text-align:center;font-size:.6rem;font-weight:800;color:var(--blue);border-bottom:1px solid var(--border);flex-shrink:0;}
.asm-slots{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:3px;flex:1;min-height:0;}
.asm-slot-col{display:flex;flex-direction:column;gap:2px;}
.asm-slot-num{text-align:center;font-size:.45rem;color:var(--blue);font-weight:700;line-height:1.3;flex-shrink:0;}
.asm-cell{
  border-radius:3px;border:1px solid var(--border);padding:2px 3px;
  position:relative;cursor:pointer;transition:border-color .12s;
  flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;
}
.asm-cell:hover{border-color:var(--blue);}
.asm-cell.empty{background:var(--empty);border-style:dashed;align-items:center;justify-content:center;}
.asm-cell.fresh{background:var(--fresh-bg);border-color:rgba(34,197,94,.3);}
.asm-cell.warn {background:var(--warn-bg); border-color:rgba(245,158,11,.3);}
.asm-cell.danger{background:var(--danger-bg);border-color:rgba(239,68,68,.35);}
.asm-tier-lbl{font-size:.42rem;color:var(--dim);font-weight:700;line-height:1;}
.asm-fifo{position:absolute;top:1px;right:2px;font-size:.4rem;font-weight:800;color:var(--orange);line-height:1;}
.asm-mat{font-size:.48rem;font-weight:700;color:var(--text);line-height:1.15;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.asm-sub{font-size:.42rem;color:var(--muted);}
.asm-dt{font-size:.4rem;color:var(--dim);}
.asm-days{font-size:.41rem;font-weight:700;}
.fresh .asm-days{color:var(--fresh);}
.warn  .asm-days{color:var(--warn);}
.danger .asm-days{color:var(--danger);}
.asm-empty-lbl{font-size:.44rem;color:var(--dim);}
.multi-badge{display:inline-flex;align-items:center;background:var(--orange);color:#fff;
  font-size:.4rem;font-weight:800;border-radius:3px;padding:0 2px;margin-left:1px;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px;width:420px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:.88rem;margin-bottom:13px;}
.frow{margin-bottom:9px;}
.frow label{display:block;font-size:.65rem;color:var(--dim);margin-bottom:3px;}
.frow input,.frow select,.frow textarea{width:100%;padding:6px 9px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.76rem;}
.frow textarea{min-height:80px;resize:vertical;font-family:monospace;font-size:.68rem;}
.frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--blue);}
.modal-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:13px;}
.modal-btns button{padding:6px 14px;border-radius:5px;border:none;font-size:.74rem;cursor:pointer;font-weight:600;}
.b-cancel{background:var(--surface2);color:var(--muted);}
.b-save{background:var(--blue);color:#fff;}
.b-del{background:var(--danger);color:#fff;}
.parse-hint{font-size:.62rem;color:var(--dim);margin-top:5px;padding:6px;background:var(--surface2);border-radius:5px;border-left:3px solid var(--orange);line-height:1.5;}
.item-list{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.item-row{background:var(--surface2);border-radius:4px;padding:4px 7px;display:flex;align-items:center;gap:4px;}
.item-del-btn{margin-left:auto;background:var(--danger);color:#fff;border:none;border-radius:3px;font-size:.56rem;padding:2px 5px;cursor:pointer;}
.file-drop{border:2px dashed var(--border);border-radius:7px;padding:15px;text-align:center;cursor:pointer;transition:all .15s;font-size:.7rem;color:var(--muted);}
.file-drop:hover,.file-drop.drag{border-color:var(--blue);background:rgba(59,130,246,.07);color:var(--blue);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <h1><span>FMS</span> 창고 로케이션 현황</h1>
  <div class="live"><div class="dot"></div>LIVE</div>
  <div id="nowTime"></div>
  <div class="sum-pills" id="summaryBar"></div>
</div>

<!-- CONTROLS -->
<div class="ctrl">
  <button class="btn active" id="btnAll" onclick="filterView('all')">전체</button>
  <button class="btn" id="btnDanger" onclick="filterView('danger')">⚠ 위험 출고</button>
  <button class="btn btn-up" onclick="openUploadModal()">📂 TXT 불러오기</button>
  <button class="btn btn-add" onclick="openAddModal(null,null)">+ 입고 등록</button>
  <button class="btn" onclick="clearAll()">🔄 리셋</button>
  <div class="legend-inline">
    <div class="li"><div class="ld" style="background:var(--fresh)"></div>안전(≤10일)</div>
    <div class="li"><div class="ld" style="background:var(--warn)"></div>주의(11~20일)</div>
    <div class="li"><div class="ld" style="background:var(--danger)"></div>위험(21일+)</div>
    <div class="li" style="color:var(--orange);font-weight:600;font-size:.58rem;">↑ 선입선출: 상단→하단→다음</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="racks-col" id="racksCol"></div>
  <div class="asm-col" id="asmCol"></div>
</div>

<!-- Upload Modal -->
<div class="overlay" id="uploadOverlay">
  <div class="modal">
    <h2>📂 발주 텍스트 파일 불러오기</h2>
    <div class="frow">
      <label>① 파일 선택 (.txt / .tsv)</label>
      <div class="file-drop" id="fileDrop"
        onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event)">
        <div id="fileDropLabel">📄 클릭하거나 파일을 여기로 드래그하세요</div>
        <input type="file" id="fileInput" accept=".txt,.tsv,.csv" style="display:none" onchange="handleFileSelect(event)">
      </div>
    </div>
    <div style="text-align:center;font-size:.65rem;color:var(--dim);margin:4px 0;">— 또는 —</div>
    <div class="frow">
      <label>② 텍스트 직접 붙여넣기</label>
      <textarea id="tsvInput" placeholder="메모장/엑셀에서 Ctrl+A → Ctrl+C → 여기에 Ctrl+V"></textarea>
    </div>
    <div id="fileStatus" style="font-size:.65rem;color:var(--fresh);margin-bottom:3px;display:none;"></div>
    <div class="parse-hint">💡 컬럼: 그룹구분/창고/창고명/BIN/BIN Desc./품목그룹/품목계정/품목코드/품목명/규격/단위/TrackingNo/LotNo/입고일/0~10일/11~20일/21일이상<br>• 기존 데이터에 추가됩니다. 중복 Lot No.는 건너뜁니다.</div>
    <div class="modal-btns">
      <button class="b-cancel" onclick="closeUpload()">취소</button>
      <button class="b-save" onclick="parseTSV()">불러오기</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h2 id="editTitle">📦 입고 등록</h2>
    <div class="frow"><label>로케이션</label><select id="eLoc"></select></div>
    <div class="frow"><label>단 (Tier)</label>
      <select id="eTier"><option value="lower">하단</option><option value="upper">상단</option></select>
    </div>
    <div class="frow"><label>품목코드</label><input type="text" id="eCode" placeholder="예) SR0325L-K21442"></div>
    <div class="frow"><label>품목명</label><input type="text" id="eName" placeholder="예) ABS SR0325L 롯데케미칼"></div>
    <div class="frow"><label>Lot No.</label><input type="text" id="eLot"></div>
    <div class="frow" style="display:grid;grid-template-columns:1fr 80px;gap:7px;">
      <div><label>수량/중량</label><input type="number" id="eQty"></div>
      <div><label>단위</label><select id="eUnit"><option value="KG">KG</option><option value="EA">EA</option></select></div>
    </div>
    <div class="frow"><label>입고일자</label><input type="date" id="eDate"></div>
    <div id="existingItems"></div>
    <div class="modal-btns">
      <button class="b-cancel" onclick="closeEdit()">취소</button>
      <button class="b-save" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════
//  CONFIG
// ════════════════════════════════════
const PALLET_RACKS=[
  {id:'ARM-RO2',locs:['01','02','03','04','05','06','07','08','09','10']},
  {id:'ARM-RO3',locs:['01','02','03','04','05','06','07','08','09','10']},
  {id:'ASM-G',  locs:['01','02','03','04','05','06','07','08','09','10']}
];
const ASM_UNITS=['ASM-A','ASM-B','ASM-C','ASM-D'];
const ASM_SLOTS=['1','2','3','4'];

// 1칸 = 1000kg / (4cols×8rows) = 31.25kg per bag
const KG_PER_BAG = 1000/32;   // ≈31.25kg
const COLS=4, ROWS=8, TOTAL_BAGS=COLS*ROWS; // 32 bags = 1000kg

let store={};

function allLocKeys(){
  const k=[];
  PALLET_RACKS.forEach(r=>r.locs.forEach(l=>k.push(r.id+'-'+l)));
  ASM_UNITS.forEach(u=>ASM_SLOTS.forEach(s=>k.push(u+'-'+s)));
  return k;
}
function initStore(){
  allLocKeys().forEach(k=>{if(!store[k])store[k]={lower:[],upper:[]};});
  const s=localStorage.getItem('wh4');
  if(s){try{store=JSON.parse(s);}catch(e){}}
  allLocKeys().forEach(k=>{if(!store[k])store[k]={lower:[],upper:[]};});
}
function saveStore(){localStorage.setItem('wh4',JSON.stringify(store));}

// ════════════════════════════════════
//  HELPERS
// ════════════════════════════════════
function daysSince(d){return !d?0:Math.max(0,Math.floor((new Date()-new Date(d))/86400000));}
function cc(days){return days<=10?'fresh':days<=20?'warn':'danger';}
function dL(d){return d+'일';}

// 최대 1000kg를 32개 bag(4×8)로 표현
// 소진 = 위에서부터 → off(빈칸)가 위, on(채워진칸)이 아래에 쌓임
function resinGrid(kg,cls){
  const filledBags=Math.min(TOTAL_BAGS, Math.max(0, Math.round((kg/1000)*TOTAL_BAGS)));
  const emptyBags=TOTAL_BAGS-filledBags;
  let cells='';
  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      const bagIdx=row*COLS+col;
      // 위쪽(작은 idx)이 비어있고, 아래쪽(큰 idx)이 채워짐
      cells+=`<div class="rb ${bagIdx<emptyBags?'off':'on'}"></div>`;
    }
  }
  return `<div class="resin-grid">${cells}</div>`;
}

function normalizeBIN(bin){
  if(!bin)return null;
  bin=bin.trim()
    .replace(/^ARM-R0([23])-(\d+)$/i,(_,n,loc)=>`ARM-RO${n}-${loc.padStart(2,'0')}`)
    .replace(/^(ASM-G)-(\d+)$/i,(_,p,n)=>`${p}-${n.padStart(2,'0')}`)
    .replace(/^(ASM-[ABCD])-(\d+)$/i,(_,p,n)=>`${p}-${n}`);
  return bin;
}

// ════════════════════════════════════
//  1000KG 초과 자동 분리 로직
// ════════════════════════════════════
// 하단=꽉찬 파렛(1000kg), 상단=소진중 파렛(먼저 출고)
function splitKgItem(locKey, item){
  const kg=parseFloat(item.qty)||0;
  if(item.unit!=='KG'||kg<=1000){
    // 단일 파렛: 하단 먼저(꽉찬 파렛), 그 다음 상단(소진중)
    if(store[locKey].lower.length===0) store[locKey].lower.push(item);
    else if(store[locKey].upper.length===0) store[locKey].upper.push(item);
    else store[locKey].upper.push(item);
    return;
  }
  // 1000KG 초과 → 하단=1000kg(꽉찬), 상단=나머지(먼저 소진)
  const lowerItem={...item, qty:1000};
  const upperItem={...item, qty:Math.round(kg-1000)};
  store[locKey].lower=[lowerItem];
  store[locKey].upper=[upperItem];
}

// ════════════════════════════════════
//  RENDER — PALLET CELL
// ════════════════════════════════════
function renderPCell(key,tier,fifo){
  const items=store[key]?store[key][tier]:[];
  if(!items||items.length===0)
    return `<div class="pcell empty" onclick="openAddModal('${key}','${tier}')">
      <div class="fifo-tag">#${fifo}</div>
      <div class="empty-lbl">빈칸</div>
    </div>`;
  const totalKg=items.reduce((s,i)=>s+(parseFloat(i.qty)||0),0);
  const oldest=items.reduce((a,b)=>new Date(a.date)<=new Date(b.date)?a:b);
  const days=daysSince(oldest.date),cls=cc(days),p=items[0],multi=items.length>1;
  const isKg=p.unit==='KG';
  return `<div class="pcell ${cls}" onclick="openAddModal('${key}','${tier}')">
    <div class="fifo-tag">#${fifo}</div>
    ${isKg?resinGrid(totalKg,cls):''}
    <div class="cell-info">
      <div class="cell-mat">${p.name||p.code}${multi?`<span class="multi-badge">+${items.length-1}</span>`:''}</div>
      <div class="cell-kg">${totalKg.toLocaleString()} ${p.unit||'KG'}</div>
      <div class="cell-dt">입고일 ${oldest.date}</div>
      <div class="cell-lot">LOT ${oldest.lot||'-'}</div>
      <div class="cell-days">${dL(days)}</div>
    </div>
  </div>`;
}

// ════════════════════════════════════
//  RENDER — PALLET RACKS
// ════════════════════════════════════
function renderPalletRacks(){
  return PALLET_RACKS.map(rack=>{
    const locHdr=rack.locs.map(l=>`<div class="rack-loc-num">${l}</div>`).join('');
    const upper=rack.locs.map((l,i)=>renderPCell(rack.id+'-'+l,'upper',i*2+1)).join('');
    const lower=rack.locs.map((l,i)=>renderPCell(rack.id+'-'+l,'lower',i*2+2)).join('');
    return `<div class="rack-block">
      <div class="rack-header">
        <div class="rack-badge">${rack.id}</div>
        <div class="rack-name">파레트 렉</div>
        <div class="fifo-note">선입선출: <span>상단→하단→다음</span></div>
      </div>
      <div class="rack-body">
        <div class="rack-loc-header">${locHdr}</div>
        <div class="rack-tier-row"><div class="tier-label tier-upper">상</div>${upper}</div>
        <div class="rack-tier-row"><div class="tier-label tier-lower">하</div>${lower}</div>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════
//  RENDER — ASM
// ════════════════════════════════════
function renderAsmCell(key,tier,fifo){
  const items=store[key]?store[key][tier]:[];
  const tl=tier==='lower'?'하':'상';
  if(!items||items.length===0)
    return `<div class="asm-cell empty" onclick="openAddModal('${key}','${tier}')">
      <div class="asm-tier-lbl">${tl}</div><div class="asm-fifo">#${fifo}</div>
      <div class="asm-empty-lbl">빈칸</div>
    </div>`;
  const oldest=items.reduce((a,b)=>new Date(a.date)<=new Date(b.date)?a:b);
  const days=daysSince(oldest.date),cls=cc(days),p=items[0],multi=items.length>1;
  const total=items.reduce((s,i)=>s+(parseFloat(i.qty)||0),0);
  return `<div class="asm-cell ${cls}" onclick="openAddModal('${key}','${tier}')">
    <div class="asm-tier-lbl">${tl}</div><div class="asm-fifo">#${fifo}</div>
    <div class="asm-mat">${p.name||p.code}${multi?`<span class="multi-badge">+${items.length-1}</span>`:''}</div>
    <div class="asm-sub">${total.toLocaleString()} ${p.unit||'EA'}</div>
    <div class="asm-dt">${oldest.date}</div>
    <div class="asm-days">${dL(days)}</div>
  </div>`;
}

function renderASM(){
  const units=ASM_UNITS.map(unit=>{
    const slots=ASM_SLOTS.map((s,idx)=>{
      const key=unit+'-'+s;
      return `<div class="asm-slot-col">
        <div class="asm-slot-num">${s}</div>
        ${renderAsmCell(key,'upper',idx*2+1)}
        ${renderAsmCell(key,'lower',idx*2+2)}
      </div>`;
    }).join('');
    return `<div class="asm-unit">
      <div class="asm-unit-hdr">${unit}</div>
      <div class="asm-slots">${slots}</div>
    </div>`;
  }).join('');
  return `<div class="asm-outer">
    <div class="rack-header">
      <div class="rack-badge">ASM</div>
      <div class="rack-name">부자재 소물 다이</div>
      <div class="fifo-note">선입선출: <span>상→하→다음슬롯</span></div>
    </div>
    <div class="asm-unit-wrap">${units}</div>
  </div>`;
}

// ════════════════════════════════════
//  SUMMARY
// ════════════════════════════════════
function renderSummary(){
  let total=0,occ=0,fresh=0,warn=0,danger=0;
  Object.values(store).forEach(cell=>['lower','upper'].forEach(t=>{
    total++;
    const items=cell[t];
    if(items&&items.length>0){
      occ++;
      const d=daysSince(items.reduce((a,b)=>new Date(a.date)<=new Date(b.date)?a:b).date);
      if(d<=10)fresh++;else if(d<=20)warn++;else danger++;
    }
  }));
  document.getElementById('summaryBar').innerHTML=`
    <div class="sp cb"><span class="sv">${occ}</span>점유/${total}</div>
    <div class="sp cg"><span class="sv">${fresh}</span>안전</div>
    <div class="sp cw"><span class="sv">${warn}</span>주의</div>
    <div class="sp cd"><span class="sv">${danger}</span>위험</div>`;
}

function renderAll(){
  document.getElementById('racksCol').innerHTML=renderPalletRacks();
  document.getElementById('asmCol').innerHTML=renderASM();
  renderSummary();
}

// ════════════════════════════════════
//  FILE HANDLING
// ════════════════════════════════════
function handleFileSelect(e){const f=e.target.files[0];if(f)readFile(f);}
function handleDrop(e){
  e.preventDefault();
  document.getElementById('fileDrop').classList.remove('drag');
  const f=e.dataTransfer.files[0];if(f)readFile(f);
}
function readFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const text=ev.target.result;
    document.getElementById('tsvInput').value=text;
    document.getElementById('fileDropLabel').textContent='✅ '+file.name+' 로드 완료';
    const st=document.getElementById('fileStatus');
    st.textContent='파일 로드됨: '+file.name+' ('+text.split(/\r?\n/).length+'줄)';
    st.style.display='block';
  };
  reader.readAsText(file,'UTF-8');
}

// ════════════════════════════════════
//  TSV PARSE
// ════════════════════════════════════
function parseTSV(){
  const raw=document.getElementById('tsvInput').value.trim();
  if(!raw){alert('파일을 선택하거나 데이터를 붙여넣어 주세요.');return;}
  const lines=raw.split(/\r?\n/);
  let added=0,skipped=0;
  const existingLots=new Set();
  Object.values(store).forEach(cell=>['lower','upper'].forEach(t=>cell[t].forEach(i=>existingLots.add(i.lot))));

  lines.forEach(line=>{
    const c=line.split('\t');
    if(c.length<14)return;
    const [group,,,binRaw,,,, code,name,,unit,,lot,dateStr,q0,q11,q21]=c;
    if(!binRaw||!dateStr||dateStr==='입고일'||binRaw==='BIN')return;
    const locKey=normalizeBIN(binRaw);
    if(!locKey)return;
    if(lot&&existingLots.has(lot.trim())){skipped++;return;}
    if(!store[locKey])store[locKey]={lower:[],upper:[]};
    const qty=parseFloat(q0)||parseFloat(q11)||parseFloat(q21)||0;
    const item={
      code:(code||'').trim(),name:(name||'').trim(),
      lot:(lot||'').trim(),qty,unit:(unit||'EA').trim(),
      date:dateStr.trim(),group:(group||'').trim()
    };
    // KG & >1000 → 하단 1000 / 상단 나머지
    splitKgItem(locKey, item);
    existingLots.add(item.lot);
    added++;
  });
  saveStore();closeUpload();renderAll();
  alert(`✅ ${added}건 추가 / ${skipped}건 중복 건너뜀`);
}

// ════════════════════════════════════
//  FILTER
// ════════════════════════════════════
function filterView(mode){
  document.querySelectorAll('#btnAll,#btnDanger').forEach(b=>b.classList.remove('active'));
  document.getElementById(mode==='all'?'btnAll':'btnDanger').classList.add('active');
  document.querySelectorAll('.pcell,.asm-cell').forEach(el=>{
    el.style.opacity=(mode==='all'||el.classList.contains('danger'))?'1':'0.15';
  });
}

// ════════════════════════════════════
//  MODAL
// ════════════════════════════════════
function openUploadModal(){
  document.getElementById('tsvInput').value='';
  document.getElementById('fileDropLabel').textContent='📄 클릭하거나 파일을 여기로 드래그하세요';
  document.getElementById('fileStatus').style.display='none';
  document.getElementById('fileInput').value='';
  document.getElementById('uploadOverlay').classList.add('open');
}
function closeUpload(){document.getElementById('uploadOverlay').classList.remove('open');}

function buildLocSelect(){
  const sel=document.getElementById('eLoc');sel.innerHTML='';
  PALLET_RACKS.forEach(r=>r.locs.forEach(l=>{
    const o=document.createElement('option');o.value=r.id+'-'+l;o.text=r.id+'-'+l+' (파레트렉)';sel.appendChild(o);
  }));
  ASM_UNITS.forEach(u=>ASM_SLOTS.forEach(s=>{
    const o=document.createElement('option');o.value=u+'-'+s;o.text=u+'-슬롯'+s+' (소물다이)';sel.appendChild(o);
  }));
}

function openAddModal(key,tier){
  buildLocSelect();
  if(key)document.getElementById('eLoc').value=key;
  if(tier)document.getElementById('eTier').value=tier;
  ['eCode','eName','eLot','eQty'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('eDate').value=new Date().toISOString().slice(0,10);
  renderExistingItems(key,tier);
  document.getElementById('editOverlay').classList.add('open');
}

function renderExistingItems(key,tier){
  const el=document.getElementById('existingItems');
  if(!key||!tier||!store[key]){el.innerHTML='';return;}
  const items=store[key][tier]||[];
  if(!items.length){el.innerHTML='';return;}
  el.innerHTML=`<div style="font-size:.64rem;color:var(--dim);margin:6px 0 3px;">▼ 현재 입고 항목</div>
    <div class="item-list">${items.map((item,i)=>`<div class="item-row">
      <div>
        <div style="font-size:.66rem;font-weight:700;">${item.name||item.code}</div>
        <div style="font-size:.58rem;color:var(--dim);">${item.lot} | ${item.qty}${item.unit} | ${item.date}</div>
      </div>
      <button class="item-del-btn" onclick="deleteItem('${key}','${tier}',${i})">삭제</button>
    </div>`).join('')}</div>`;
}

function deleteItem(key,tier,idx){
  if(!confirm('삭제하시겠습니까?'))return;
  store[key][tier].splice(idx,1);saveStore();renderAll();renderExistingItems(key,tier);
}

function saveItem(){
  const key=document.getElementById('eLoc').value,tier=document.getElementById('eTier').value;
  const code=document.getElementById('eCode').value.trim(),name=document.getElementById('eName').value.trim();
  const lot=document.getElementById('eLot').value.trim(),qty=parseFloat(document.getElementById('eQty').value)||0;
  const unit=document.getElementById('eUnit').value,date=document.getElementById('eDate').value;
  if(!name&&!code){alert('품목명 또는 품목코드를 입력해주세요.');return;}
  if(!date){alert('입고일자를 입력해주세요.');return;}
  if(!store[key])store[key]={lower:[],upper:[]};

  const item={code,name,lot,qty,unit,date,group:''};
  if(unit==='KG'&&qty>1000){
    splitKgItem(key,item);
  } else {
    // 하단 먼저(꽉찬), 상단은 소진중 파렛
    if(store[key].lower.length===0) store[key].lower.push(item);
    else if(store[key].upper.length===0) store[key].upper.push(item);
    else store[key][tier].push(item);
  }
  saveStore();closeEdit();renderAll();
}

function closeEdit(){document.getElementById('editOverlay').classList.remove('open');}

function clearAll(){
  if(!confirm('전체 초기화?'))return;
  allLocKeys().forEach(k=>{store[k]={lower:[],upper:[]};});
  saveStore();renderAll();
}

// CLOCK
function updateClock(){
  const n=new Date();
  document.getElementById('nowTime').textContent=
    n.toLocaleDateString('ko-KR')+' '+n.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock,1000);updateClock();

['uploadOverlay','editOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

initStore();renderAll();
setInterval(renderAll,60000);
</script>
